<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driver Schedule Tool</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
    h1 { text-align: center; }
    #trip-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
    .trip-card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .trip-card h3 { margin: 0 0 10px; }
    button { margin-right: 10px; padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; }
    button:first-of-type { background: #007bff; color: #fff; }
    button:last-of-type { background: #28a745; color: #fff; }
    select { margin: 10px auto; display: block; padding: 5px; }
  </style>
</head>
<body>
  <h1 id="greeting"></h1>
  <select id="day-filter"></select>
  <div id="trip-container"></div>
  <script src="script.js"></script>
</body>
</html>
